<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PABLU - Vielen Dank</title>
    <style>
        /* Grunddesign & Schriften */
        body {
            font-family: 'Arial Black', 'Arial', sans-serif; /* Ähnelt der wuchtigen Schrift im Design */
            background-color: #ffffff;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Header / Navigation Platzhalter */
        header {
            width: 100%;
            padding: 20px 0;
            display: flex;
            justify-content: center;
            align-items: center;
            border-bottom: 1px solid #eee;
            margin-bottom: 80px;
        }

        .logo {
            height: 40px; /* Skaliert das Logo passend zur Navigationsleiste */
        }

        /* Hauptinhalt */
        .content {
            text-align: center;
            padding: 0 20px;
        }

        h1 {
            color: #A51D29; /* Dein angegebener Rotton */
            font-style: italic;
            font-size: 2.5rem;
            text-transform: uppercase;
            letter-spacing: -1px;
            margin-bottom: 10px;
        }

        .subtext {
            color: #333;
            font-size: 1.1rem;
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 1px;
        }

        /* Button-Stil passend zu "Tickets Kaufen" */
        .btn-back {
            display: inline-block;
            margin-top: 40px;
            background-color: #A51D29;
            color: white;
            text-decoration: none;
            padding: 12px 30px;
            font-style: italic;
            font-weight: bold;
            text-transform: uppercase;
            border-radius: 4px;
            transition: opacity 0.2s;
        }

        .btn-back:hover {
            opacity: 0.9;
        }

        /* Responsivität für Mobilgeräte */
        @media (max-width: 600px) {
            h1 { font-size: 1.8rem; }
            header { margin-bottom: 40px; }
        }
    </style>
</head>
<body>

    <header>
        <img src="./assets/logo.png" alt="PABLU Logo" class="logo">
    </header>

    <div class="content">
        <h1>Vielen Dank für deine Stimme!</h1>
        <p class="subtext">Deine Auswahl wurde erfolgreich übermittelt.</p>
       
        <a href="/" class="btn-back">Zurück zur Startseite</a>
    </div>

</body>
</html>
